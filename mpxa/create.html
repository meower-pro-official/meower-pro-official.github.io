<!DOCTYPE html>
<html>
  <head>
    <title>Meower-ProX Account</title>
    <link rel="stylesheet" href="/STYLESHEET.css">
    <link rel="icon" type="image/x-icon" href="/favicon.png">
  </head>
  <body>
    <h1>Create Account</h1>
    <form id="registerationForm">
      Username: <input type="text" id="CAUSERNAME" placeholder="user-10101010">*<br>
      Display name: <input type="text" id="CADNAME" placeholder="User 10101010">*<br>
      Profile picture:  <input type="file" id="CAPFP" accept="image/png, image/jpeg, image/webp, image/gif, image/heic, image/tiff, image/svg+xml, image/vnd.adobe.photoshop, image/avif, image/vnd.microsoft.icon, image/apng, image/aces, image/bmp"><br>(Recommended size: 64x64px)<br>
      Password: <input type="password" id="CAPASSWORD">*<br>
      <button onclick="createMpxAccount()">Create account</button><br>
      * means the input is required
    </form>
    <script src="https://jsdelivr.net"></script>
    <script src="get_account.js"></script>
  </body>
</html>
